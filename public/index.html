  <script>
    (function () {
      const loadingMessages = {
        en: "Loading Planner OS...",
        sk: "Načítavam Planner OS..."
      };
      const rawLang = navigator.language || "";
      const userLang = rawLang.toLowerCase();
      const langKey = userLang.startsWith("sk") || userLang.startsWith("cs") ? "sk" : "en";
      const loadingEl = document.getElementById("loading-text");
      if (loadingEl) {
        loadingEl.textContent = loadingMessages[langKey] || loadingMessages.en;
      }
    })();
  </script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    const Icon = ({ name, className }) => {
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
      return <i data-lucide={name} className={className}></i>;
    };

    const getISOWeek = (date) => {
      const target = new Date(date.valueOf());
      const dayNr = (date.getDay() + 6) % 7;
      target.setDate(target.getDate() - dayNr + 3);
      const firstThursday = target.valueOf();
      target.setMonth(0, 1);
      if (target.getDay() !== 4) {
        target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
      }
      return 1 + Math.ceil((firstThursday - target) / 604800000);
    };

    const getWeekRangeStr = (w, c) => {
      const startM = w[0].getMonth();
      const endM = w[6].getMonth();
      if (startM === endM) {
        return `${w[0].getDate()}. - ${w[6].getDate()}. ${c.strings.months[endM]}`;
      }
      return `${w[0].getDate()}. ${c.strings.months[startM]} - ${w[6].getDate()}. ${c.strings.months[endM]}`;
    };

    const Links = (c, d) => ({
      cal: c.calendarTool === 'apple' ? `calshow:${Math.floor(d.getTime() / 1000)}` : `https://calendar.google.com/calendar/render?action=TEMPLATE&text=Event&dates=${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}T080000Z/${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}T090000Z`
    });

    const FALLBACK_TRANSLATIONS = {

        secStringsDesc: "Edit all words.",
        subMainTexts: "Main Texts",
        subDays: "Days",
        subMonths: "Months",
        lblFull: "Full Name",
        lblShort: "Short",

        lblOddWeek: "Odd Week",
        secTracker: "Leave Tracker & Limits",
        trackerNote: "If you set a value to 0, it won't be generated in the planner.",
        trackerTitleLabel: "Page Title",
        trackerVacationLabel: "Vacation",
        trackerDoctorLabel: "Doctor",
        trackerFamilyLabel: "Family Care",
        trackerSick1Label: "Sick Days (1st Term)",
        trackerSick2Label: "Sick Days (2nd Term)",
        trackerNvLabel: "Comp Time (Title)",
        trackerNvToggleLabel: "Show (0/1)",
        lblCount: "Boxes",
        lblTitle: "Title",
        lblTodo: "To-Do",
        lblNotes: "Notes",
        lblPrep: "Lesson Prep",
        navGithub: "GitHub",
        navCoffee: "Buy Me a Coffee",
        supportTitle: "Support this Project",
        supportDesc: "This digital teacher planner is open-source and completely free. If it helps you save time, please consider supporting its future development by contributing your ideas or your knowledge on GitHub.",
        btnGithub: "GitHub Repository",
        footerText: "Teacher Planner. Developed with ❤️ by"
      },
      presets: {
        title: "Teacher's Planner",
        todo: "To-Do List",
        notes: "Notes",
        prep: "Prep",
        week: "Week",
        evenWeek: "Even Week",
        oddWeek: "Odd Week",
        trackerTitle: "Absence & Leave Tracker",
        vacation1: "Vacation",
        vacation2: "Vacation",
        doctor: "Doctor / Medical",
        family: "Family Care",
        sick1: "Sick Days (1st Term)",
        sick2: "Sick Days (2nd Term)",
        nv: "Comp Time (Hours)",
        months: [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December"
        ],
        shortMonths: [
          "JAN",
          "FEB",
          "MAR",
          "APR",
          "MAY",
          "JUN",
          "JUL",
          "AUG",
          "SEP",
          "OCT",
          "NOV",
          "DEC"
        ],
        days: [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday",
          "Sunday"
        ],
        shortDays: [
          "MON",
          "TUE",
          "WED",
          "THU",
          "FRI",
          "SAT",
          "SUN"
        ]
      }
    };

    const DEFAULT_FALLBACK_LANG = 'en';
    const normalizeLanguageCode = (lang) => (lang || "").toLowerCase();
    const isSafeLanguageCode = (code) => /^[A-Za-z0-9-]+$/.test(code);
    const assertLanguageCode = (code, label) => {
      if (!isSafeLanguageCode(code)) {
        throw new Error(`Invalid ${label} language code '${code}'. Only letters, numbers, and hyphens are allowed.`);
      }
    };

    const resolvePreferredLang = (languages, fallback) => {
      const userLang = normalizeLanguageCode(navigator.language);
      if (!userLang) {
        return fallback || DEFAULT_FALLBACK_LANG;
      }
      const userBase = userLang.split("-")[0];
      const matchLang = (code) => languages.find((lang) => normalizeLanguageCode(lang.code) === normalizeLanguageCode(code));
      const exactMatch = matchLang(userLang);
      if (exactMatch) return exactMatch.code;
      const baseMatch = matchLang(userBase);
      if (baseMatch) return baseMatch.code;
      const fallbackMatch = matchLang(fallback);
      if (fallbackMatch) return fallbackMatch.code;
      if (languages[0]?.code) return languages[0].code;
      return fallback || DEFAULT_FALLBACK_LANG;
    };

    const LanguagePicker = ({ languages, current, onChange, label }) => {
      const [open, setOpen] = useState(false);
      const containerRef = useRef(null);

      useEffect(() => {
        const handleClick = (event) => {
          if (containerRef.current && !containerRef.current.contains(event.target)) {
            setOpen(false);
          }
        };
        document.addEventListener("mousedown", handleClick);
        return () => document.removeEventListener("mousedown", handleClick);
      }, []);

      const selected = languages.find((lang) => lang.code === current) || languages[0];
      const selectedLabel = selected ? `${selected.flag ? `${selected.flag} ` : ""}${selected.label}` : current;

      return (
        <div ref={containerRef} className="relative">
          <div className="flex items-center gap-2">
            <span className="text-xs font-bold text-slate-500">{label}</span>
            <button
              type="button"
              onClick={() => setOpen((prev) => !prev)}
              title={selectedLabel}
              aria-label={selectedLabel}
              className="flex items-center gap-2 rounded-lg bg-slate-100 px-3 py-2 text-xs font-bold text-slate-600 hover:bg-slate-200 transition"
            >
              <span title={selectedLabel} className="truncate max-w-[120px] sm:max-w-[160px]">{selectedLabel}</span>
              <Icon name="chevron-down" className="w-4 h-4" />
            </button>
          </div>
          {open && (
            <div className="absolute right-0 mt-2 w-60 max-h-64 overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg z-50">
              {languages.map((lang) => {
                const optionLabel = `${lang.flag ? `${lang.flag} ` : ""}${lang.label}`;
                const isActive = lang.code === current;
                return (
                  <button
                    key={lang.code}
                    type="button"
                    onClick={() => {
                      onChange(lang.code);
                      setOpen(false);
                    }}
                    className={`w-full text-left px-3 py-2 text-sm transition ${isActive ? "bg-slate-100 text-blue-600" : "text-slate-700 hover:bg-slate-50"}`}
                  >
                    {optionLabel}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [view, setView] = useState('settings');
      const [isDownloading, setIsDownloading] = useState(false);
      const isMountedRef = useRef(true);
      const [languages, setLanguages] = useState([]);
      const [appLang, setAppLang] = useState(DEFAULT_FALLBACK_LANG);
      const [fallbackLang, setFallbackLang] = useState(DEFAULT_FALLBACK_LANG);
      const [ui, setUi] = useState(FALLBACK_TRANSLATIONS.ui);

      const [config, setConfig] = useState({
        orientation: 'landscape', startYear: new Date().getFullYear(), startMonth: 8, durationMonths: 10, periodsCount: 8, calendarTool: 'google', strings: FALLBACK_TRANSLATIONS.presets,
        trackerCounts: { vacation1: 45, vacation2: 45, doctor: 7, family: 7, sick1: 2, sick2: 2, nv: 1 } // nv is used just as a boolean toggle (0 or >0)
      });

      const applyLanguage = useCallback((langCode, languageData, langMeta) => {
        if (!isMountedRef.current) return;
        setAppLang(langCode);
        setUi(languageData.ui);
        setConfig(prev => ({ ...prev, strings: languageData.presets }));
        const dir = langMeta?.dir || 'ltr';
        document.documentElement.lang = langCode;
        document.documentElement.dir = dir;
      }, []);

      const loadLanguage = useCallback(async (langCode, availableLanguages, fallbackCode) => {
        const requestedCode = langCode || fallbackCode || DEFAULT_FALLBACK_LANG;
        const meta = availableLanguages.find((lang) => normalizeLanguageCode(lang.code) === normalizeLanguageCode(requestedCode));
        const fileCode = meta?.code || requestedCode;
        const normalizedFileCode = normalizeLanguageCode(fileCode);
        const normalizedFallback = fallbackCode ? normalizeLanguageCode(fallbackCode) : null;
        try {
          assertLanguageCode(requestedCode, 'requested');
          assertLanguageCode(fileCode, 'resolved');
          const res = await fetch(`/strings/${fileCode}.json`);
          if (!res.ok) throw new Error(`Failed to load language file ${fileCode}`);
          const data = await res.json();
          if (!data.ui || !data.presets) throw new Error(`Invalid language file ${fileCode}`);
          applyLanguage(fileCode, data, meta);
          return true;
        } catch (err) {
          console.error(`Failed to load language ${fileCode}`, err);
          if (fallbackCode && normalizedFileCode !== normalizedFallback) {
            return loadLanguage(fallbackCode, availableLanguages, null);
          }
          if (normalizedFileCode !== DEFAULT_FALLBACK_LANG) {
            return loadLanguage(DEFAULT_FALLBACK_LANG, availableLanguages, null);
          }
          return false;
        }
      }, [applyLanguage]);

      useEffect(() => {
        isMountedRef.current = true;
        const loadIndex = async () => {
          try {
            const res = await fetch('/strings/index.json');
            if (!res.ok) throw new Error('Failed to load language index');
            const data = await res.json();
            if (!isMountedRef.current) return;
            const available = Array.isArray(data.languages) ? data.languages : [];
            const defaultLang = data.default || DEFAULT_FALLBACK_LANG;
            setFallbackLang(defaultLang);
            setLanguages(available);
            const preferred = resolvePreferredLang(available, defaultLang);
            await loadLanguage(preferred, available, defaultLang);
          } catch (err) {
            console.error('Failed to load language index', err);
            if (!isMountedRef.current) return;
            const fallbackList = [{ code: DEFAULT_FALLBACK_LANG, label: 'English', dir: 'ltr' }];
            setFallbackLang(DEFAULT_FALLBACK_LANG);
            setLanguages(fallbackList);
            await loadLanguage(DEFAULT_FALLBACK_LANG, fallbackList, DEFAULT_FALLBACK_LANG);
          }
        };
        loadIndex();
        return () => {
          isMountedRef.current = false;
        };
      }, [loadLanguage]);

      const changeAppLang = (lang) => {
        loadLanguage(lang, languages, fallbackLang);
      };

      const handleDownloadPdf = async () => {
        setIsDownloading(true);
        try {
          const res = await fetch('/api/generate-pdf', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(config)
          });
          if (!res.ok) throw new Error(ui.serverError);
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${config.strings.title.replace(/\s+/g, '_')}.pdf`;
          a.click();
        } catch (err) {
          alert(`${ui.pdfError}${err.message}`);
        } finally {
          setIsDownloading(false);
        }
      };

      return (
        <div>
          {}
          <div className="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 shadow-sm print:hidden">
            <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                  <Icon name="pen-line" className="text-white w-4 h-4" />
                </div>
                <div>
                  <h1 className="font-bold text-lg tracking-tight leading-none mb-0.5">{ui.appTitle}</h1>
                  <p className="text-[10px] text-slate-400 font-medium hidden sm:block">by emgi2</p>
                </div>
                
                {/* Rýchle prepojenia na GitHub a Coffee na desktope */}
                <div className="hidden lg:flex items-center gap-4 ml-6 pl-6 border-l border-slate-200">
                  <a href="https://github.com/bachelor-emgi/planner" target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 text-xs font-semibold text-slate-500 hover:text-slate-800 transition-colors">
                    {}
                    <svg className="w-4 h-4 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                    </svg>
                    <span>{ui.navGithub}</span>
                  </a>
                </div>
              </div>
              <div className="flex gap-3 items-center">
                {view === 'settings' && languages.length > 0 && (
                  <div className="mr-6">
                    <LanguagePicker
                      languages={languages}
                      current={appLang}
                      onChange={changeAppLang}
                      label={ui.langToggleMsg}
                    />
                  </div>
                )}
                {view === 'preview' && (<button onClick={() => setView('settings')} className="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-100 rounded-xl"><Icon name="settings" className="w-4 h-4" /> {ui.btnSettings}</button>)}
                {view === 'settings' && (<button onClick={() => setView('preview')} className="flex items-center gap-2 px-6 py-2 bg-slate-200 text-slate-800 text-sm font-bold rounded-xl hover:bg-slate-300 transition"><Icon name="eye" className="w-4 h-4" /> {ui.btnGenerate}</button>)}
                <button onClick={handleDownloadPdf} disabled={isDownloading} className={`flex items-center gap-2 px-6 py-2 text-white text-sm font-bold rounded-xl transition shadow-md ${isDownloading ? 'bg-blue-400' : 'bg-blue-600 hover:bg-blue-700'}`}>
                  <Icon name={isDownloading ? "loader-2" : "download"} className={`w-4 h-4 ${isDownloading ? 'animate-spin' : ''}`} />
                  {isDownloading ? ui.btnGenerating : ui.btnSave}
                </button>
              </div>
            </div>
          </div>
          <main className="p-4 sm:p-8 flex justify-center">
            {view === 'settings' ? <SettingsDashboard config={config} setConfig={setConfig} ui={ui} /> : <PlannerDocument config={config} />}
          </main>
        </div>
      );
    }

    function SettingsDashboard({ config, setConfig, ui }) {
      const uS = (k, v) => setConfig(p => ({ ...p, strings: { ...p.strings, [k]: v } }));
      const uA = (k, i, v) => { const a = [...config.strings[k]]; a[i] = v; setConfig(p => ({ ...p, strings: { ...p.strings, [k]: a } })); };
      const uTC = (k, v) => setConfig(p => ({ ...p, trackerCounts: { ...p.trackerCounts, [k]: parseInt(v) || 0 } }));

      return (
        <div className="w-full max-w-6xl grid gap-8 pb-20 print:hidden" style={{ gridTemplateColumns: '1fr' }}>
          <div className="space-y-6">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
              <h2 className="text-xl font-bold mb-4">{ui.secLayout}</h2>
              <div className="flex gap-4">
                <label className={`flex-1 p-4 rounded-xl border-2 cursor-pointer ${config.orientation === 'landscape' ? 'border-blue-500 bg-blue-50' : 'border-slate-100'}`}><input type="radio" value="landscape" checked={config.orientation === 'landscape'} onChange={e => setConfig({ ...config, orientation: e.target.value })} className="hidden" /><div className="font-bold">{ui.optLandscape}</div></label>
                <label className={`flex-1 p-4 rounded-xl border-2 cursor-pointer ${config.orientation === 'portrait' ? 'border-blue-500 bg-blue-50' : 'border-slate-100'}`}><input type="radio" value="portrait" checked={config.orientation === 'portrait'} onChange={e => setConfig({ ...config, orientation: e.target.value })} className="hidden" /><div className="font-bold">{ui.optPortrait}</div></label>
              </div>
            </div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">

    function PlannerDocument({ config }) {
      const am = useMemo(() => {
        const m = []; let y = config.startYear; let mm = config.startMonth;
        for (let i = 0; i < config.durationMonths; i++) { m.push({ year: y, month: mm }); mm++; if (mm > 11) { mm = 0; y++; } } return m;
      }, [config]);

      const getW = (y, m) => {
        const w = []; let curr = new Date(y, m, 1, 12, 0, 0); let offset = curr.getDay() === 0 ? 6 : curr.getDay() - 1;
        curr.setDate(curr.getDate() - offset);
        while (curr.getMonth() === m || w.length < 4) {
          if (curr.getFullYear() > y || (curr.getFullYear() === y && curr.getMonth() > m)) { if (w.length >= 4) break; }
          if (curr.getFullYear() > y + 1) break;
          let temp = []; for (let i = 0; i < 7; i++) { temp.push(new Date(curr)); curr.setDate(curr.getDate() + 1); } w.push(temp);
        } return w;
      };

      const isL = config.orientation === 'landscape';
      const bgColors = ['bg-rose-100', 'bg-orange-100', 'bg-amber-100', 'bg-green-100', 'bg-blue-100', 'bg-indigo-100'];
      const tColors = ['text-rose-700', 'text-orange-700', 'text-amber-700', 'text-green-700', 'text-blue-700', 'text-indigo-700'];

      return (
        <div className={`flex flex-col w-full ${isL ? 'max-w-[297mm]' : 'max-w-[210mm]'}`}>

          <TrackerPage c={config} am={am} isL={isL} />

          {am.map((mObj, idx) => {
            const wks = getW(mObj.year, mObj.month);
            const t = { bg: bgColors[idx % 6], text: tColors[idx % 6] };
            const renderedWeeks = wks.filter(w => {
              const wM = w[3].getMonth(); const wY = w[3].getFullYear();
              let isO = (wM === mObj.month && wY === mObj.year);
              if (idx === 0 && !isO) { const fD = new Date(am[0].year, am[0].month, 1, 12); if (w[3] < fD) isO = true; }
              if (idx === am.length - 1 && !isO) { const lD = new Date(am[am.length - 1].year, am[am.length - 1].month + 1, 0, 12); if (w[3] > lD) isO = true; }
              return isO;
            });

            return renderedWeeks.map((w, wIdx) => {
              const mId = wIdx === 0 ? `month-${mObj.year}-${mObj.month}` : undefined;
              const wId = `week-${w[3].getFullYear()}-${w[3].getMonth()}-${w[0].getDate()}`;
              return isL
                ? <LandscapeWeek key={`${idx}-${wIdx}`} c={config} w={w} mObj={mObj} mId={mId} wId={wId} wks={wks} am={am} aI={idx} t={t} />
                : <PortraitWeek key={`${idx}-${wIdx}`} c={config} w={w} mObj={mObj} mId={mId} wId={wId} wks={wks} am={am} aI={idx} t={t} />;
            });
          })}
        </div>
      );
    }

      const isEvenWeek = getISOWeek(w[0]) % 2 === 0;
      return (
        <div id={wId} className="page-break w-[297mm] h-[210mm] bg-[#F8F9FA] relative border border-slate-200 overflow-hidden mb-8">
          <Tabs c={c} am={am} aI={aI} isL={true} />
          <div className="p-8 pr-[60px] h-full flex flex-col">
            <div className="flex-1 flex gap-5">

              {/* Lavy stlpec - Dni a Hlavicka */}
              <div className="w-[70%] flex flex-col">
                <div className="flex items-baseline gap-4 mb-3">
                  <h2 id={mId} className={`text-4xl font-extrabold ${t.text} uppercase tracking-tight`}>{c.strings.months[mObj.month]}</h2>
                  <div className="flex items-center gap-3">
                    <p className="text-xl font-bold text-slate-400">{getWeekRangeStr(w, c)}</p>
                    <span className={`px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-widest ${t.bg} ${t.text} opacity-80`}>
                      {isEvenWeek ? c.strings.evenWeek : c.strings.oddWeek}
                    </span>
                  </div>
                </div>

                <div className="flex-1 flex gap-3">
                  {w.slice(0, 5).map((d, i) => {
                    const isCurr = d.getMonth() === mObj.month;
                    return (
                      <div key={i} className={`flex-1 flex flex-col bg-white rounded-2xl border border-slate-200 overflow-hidden group ${!isCurr ? 'opacity-60 bg-slate-50' : ''}`}>
                        <div className={`${t.bg} p-2 flex flex-col gap-2 border-b border-slate-200`}>
                          <div className="flex justify-between items-start px-1 pt-1">
                            <div className="pointer-events-none">
                              <p className={`text-[10px] font-bold uppercase tracking-widest ${t.text} opacity-80 mb-1`}>{c.strings.shortDays[i]}</p>
                              <p className={`text-2xl font-black ${t.text} leading-none`}>{d.getDate()}{!isCurr && <span className="text-[10px] ml-1">{c.strings.shortMonths[d.getMonth()]}</span>}</p>
                            </div>
                            <a href={Links(c, d).cal} target="_blank" className="w-6 h-6 rounded-lg bg-white/50 flex items-center justify-center opacity-0 group-hover:opacity-100 print:opacity-100 transition z-20 hover:bg-white">
                              <Icon name="plus" className={`w-4 h-4 ${t.text}`} />
                            </a>
                          </div>
                          <div className="h-5 w-full bg-white/40 rounded-md border border-white/60"></div>
                        </div>
                        <div className="flex-1 flex flex-col">
                          {[...Array(c.periodsCount)].map((_, pIdx) => (
                            <div key={pIdx} className="flex-1 border-b border-slate-100 flex">
                              <div className="w-6 bg-slate-50 border-r border-slate-100 flex justify-center pt-2">
                                <span className="text-[10px] font-bold text-slate-400">{pIdx + 1}</span>
                              </div>
                              <div className="flex-1"></div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )
                  })}
                </div>
              </div>

              {/* Pravy stlpec - Kalendar a Bloky */}
              <div className="w-[30%] flex flex-col gap-4">
                <div className="flex justify-end">
                  <MiniCalendar c={c} mObj={mObj} currentWeek={w} wks={wks} t={t} />
                </div>
                <div className="bg-white rounded-2xl border border-slate-200 p-5 flex-1 flex flex-col">
                  <h3 className="text-[11px] font-bold uppercase tracking-widest text-slate-400 mb-4">{c.strings.todo}</h3>
                  <div className="flex-1 flex flex-col justify-around">
                    {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(i => (
                      <div key={i} className="flex items-center gap-3">
                        <div className="w-5 h-5 rounded-full border-2 border-slate-200 shrink-0"></div>
                        <div className="flex-1 border-b-2 border-slate-100 mt-2"></div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="h-[20%] flex gap-3">
                  <div className={`flex-1 bg-white rounded-2xl border border-slate-200 p-5 shadow-sm flex flex-col ${w[5].getMonth() !== mObj.month ? 'opacity-60 bg-slate-50' : ''}`}>
                    <div className="flex-1 flex flex-col items-center justify-center">
                      <span className="text-[12px] font-bold uppercase tracking-widest text-slate-400 mb-3">{c.strings.shortDays[5]}</span>
                      <span className="text-4xl font-black text-slate-700 leading-none">{w[5].getDate()}</span>
                      {w[5].getMonth() !== mObj.month && <span className="text-[10px] font-bold text-slate-400 mt-1">{c.strings.shortMonths[w[5].getMonth()]}</span>}
                    </div>
                  </div>
                  <div className={`flex-1 bg-white rounded-2xl border border-slate-200 p-5 shadow-sm flex flex-col ${w[6].getMonth() !== mObj.month ? 'opacity-60 bg-slate-50' : ''}`}>
                    <div className="flex-1 flex flex-col items-center justify-center">
                      <span className="text-[12px] font-bold uppercase tracking-widest text-slate-400 mb-3">{c.strings.shortDays[6]}</span>
                      <span className="text-4xl font-black text-slate-700 leading-none">{w[6].getDate()}</span>
                      {w[6].getMonth() !== mObj.month && <span className="text-[10px] font-bold text-slate-400 mt-1">{c.strings.shortMonths[w[6].getMonth()]}</span>}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const PortraitWeek = ({ c, w, mObj, mId, wId, wks, am, aI, t }) => {
      const l = Links(c, w[0]);
      const isEvenWeek = getISOWeek(w[0]) % 2 === 0;
      return (
        <div id={wId} className="page-break w-[210mm] h-[297mm] bg-[#F8F9FA] relative border border-slate-200 overflow-hidden mb-8">
          <Tabs c={c} am={am} aI={aI} isL={false} />
          <div className="p-10 pr-[65px] h-full flex flex-col">
            <div className="flex justify-between items-start mb-6">
              <div className="flex flex-col justify-start">
                <h2 id={mId} className={`text-5xl font-extrabold ${t.text} uppercase mb-1`}>{c.strings.months[mObj.month]}</h2>
                <div className="flex items-center gap-3">
                  <p className="text-lg font-bold text-slate-400">{c.strings.week} {getWeekRangeStr(w, c)}</p>
                  <span className={`px-2 py-1 rounded-md text-[9px] font-bold uppercase tracking-widest ${t.bg} ${t.text} opacity-80`}>
                    {isEvenWeek ? c.strings.evenWeek : c.strings.oddWeek}
                  </span>
                </div>
              </div>
              <MiniCalendar c={c} mObj={mObj} currentWeek={w} wks={wks} t={t} />
            </div>
            <div className="flex-1 flex gap-3 mb-5">
              {w.slice(0, 5).map((d, i) => {
                const isCurr = d.getMonth() === mObj.month;
                return (
                  <div key={i} className={`flex-1 flex flex-col bg-white rounded-2xl border border-slate-200 overflow-hidden group ${!isCurr ? 'opacity-60 bg-slate-50' : ''}`}>
                    <div className={`${t.bg} p-2 flex flex-col gap-2 border-b border-slate-200`}>
                      <div className="flex justify-between items-start px-1 pt-1">
                        <div className="pointer-events-none">
                          <p className={`text-[10px] font-bold uppercase tracking-widest ${t.text} opacity-80 mb-1`}>{c.strings.shortDays[i]}</p>
                          <p className={`text-2xl font-black ${t.text} leading-none`}>{d.getDate()}{!isCurr && <span className="text-[10px] ml-1">{c.strings.shortMonths[d.getMonth()]}</span>}</p>
                        </div>
                        <a href={Links(c, d).cal} target="_blank" className="w-6 h-6 rounded-lg bg-white/50 flex items-center justify-center opacity-0 group-hover:opacity-100 print:opacity-100 transition z-20 hover:bg-white">
                          <Icon name="plus" className={`w-4 h-4 ${t.text}`} />
                        </a>
                      </div>
                      <div className="h-5 w-full bg-white/40 rounded-md border border-white/60"></div>
                    </div>
                    <div className="flex-1 flex flex-col">
                      {[...Array(c.periodsCount)].map((_, pIdx) => (
                        <div key={pIdx} className="flex-1 border-b border-slate-100 relative p-1.5 flex flex-col justify-end">
                          <span className="absolute top-2 left-2 text-[10px] font-bold text-slate-300">{pIdx + 1}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )
              })}
            </div>
            <div className="h-44 flex gap-4">
              <div className="w-1/4 flex flex-col gap-3">
                <div className={`flex-1 bg-white border border-slate-200 rounded-2xl p-4 flex flex-col justify-center ${w[5].getMonth() !== mObj.month ? 'opacity-60 bg-slate-50' : ''}`}>
                  <div className="flex justify-between items-center">
                    <span className="text-[10px] font-bold uppercase text-slate-400">{c.strings.shortDays[5]}</span>
                    <span className="text-xl font-black text-slate-700">{w[5].getDate()}{w[5].getMonth() !== mObj.month && <span className="text-[10px] ml-1">{c.strings.shortMonths[w[5].getMonth()]}</span>}</span>
                  </div>
                </div>
                <div className={`flex-1 bg-white border border-slate-200 rounded-2xl p-4 flex flex-col justify-center ${w[6].getMonth() !== mObj.month ? 'opacity-60 bg-slate-50' : ''}`}>
                  <div className="flex justify-between items-center">
                    <span className="text-[10px] font-bold uppercase text-slate-400">{c.strings.shortDays[6]}</span>
                    <span className="text-xl font-black text-slate-700">{w[6].getDate()}{w[6].getMonth() !== mObj.month && <span className="text-[10px] ml-1">{c.strings.shortMonths[w[6].getMonth()]}</span>}</span>
                  </div>
                </div>
              </div>
              <div className="w-1/3 border border-slate-200 rounded-2xl p-5 bg-white flex flex-col">
                <h3 className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-4">{c.strings.todo}</h3>
                <div className="flex-1 flex flex-col justify-around">
                  {[1, 2, 3, 4, 5].map(i => (
                    <div key={i} className="flex gap-2">
                      <div className="w-4 h-4 rounded-sm border-2 border-slate-200"></div>
                      <div className="flex-1 border-b-2 border-slate-100 mt-2"></div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="flex-1 border border-slate-200 rounded-2xl p-5 bg-white flex flex-col">
                <h3 className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3">{c.strings.notes}</h3>
                <div className="flex-1 flex flex-col justify-around opacity-40">
                  {[1, 2, 3, 4, 5].map(i => <div key={i} className="border-b border-slate-400 w-full"></div>)}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('render') === 'true') {
      window.renderForPdf = (configObj) => {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        const Wrapper = () => {
          useEffect(() => {
            setTimeout(() => {
              const el = document.createElement('div');
              el.id = 'render-complete';
              document.body.appendChild(el);
            }, 1000);
          }, []);
          return (
            <div style={{ padding: 0, margin: 0, backgroundColor: 'white' }}>
              <style>{`@media print { @page { size: A4 ${configObj.orientation}; } }`}</style>
              <PlannerDocument config={configObj} />
            </div>
          );
        };
        root.render(<Wrapper />);
      };
    } else {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }
  </script>
</body>

</html>
